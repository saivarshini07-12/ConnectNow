<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectNow - Real-time Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Join/Create Room Screen (Page 1) -->
    <div id="joinPage" class="page active">
        <div class="container join-container">
            <div class="logo-section">
                <h1 class="app-title">ConnectNow</h1>
                <p class="app-subtitle">Real-time Chat Application</p>
            </div>

            <div class="form-card">
                <h2>Join or Create a Room</h2>
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Enter your name"
                        maxlength="20"
                    >
                </div>

                <div class="form-group">
                    <label for="roomId">Room ID</label>
                    <input 
                        type="text" 
                        id="roomId" 
                        placeholder="Enter or create room ID"
                        maxlength="20"
                    >
                </div>

                <div class="button-group">
                    <button id="joinBtn" class="btn btn-primary">Join Room</button>
                    <button id="createBtn" class="btn btn-secondary">Create Room</button>
                </div>

                <div id="joinError" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- Chat Screen (Page 2) -->
    <div id="chatPage" class="page">
        <div class="chat-container">
            <!-- Header -->
            <div class="chat-header">
                <div class="header-info">
                    <h2 id="roomTitle">Room</h2>
                    <p id="userCount" class="user-count">0 users online</p>
                </div>
                <button id="leaveBtn" class="btn-leave">Leave</button>
            </div>

            <!-- Active Users Section -->
            <div class="active-users-section">
                <div class="users-header">
                    <span class="users-label">Active Users</span>
                    <span id="onlineCount" class="online-indicator">0</span>
                </div>
                <div id="usersList" class="users-list"></div>
            </div>

            <!-- Messages Area -->
            <div id="messagesContainer" class="messages-container">
                <!-- Messages will be added here dynamically -->
            </div>

            <!-- System Messages -->
            <div id="systemMessagesContainer" class="system-messages-container">
                <!-- System notifications will appear here -->
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type your message..."
                    autocomplete="off"
                >
                <button id="sendBtn" class="btn-send">
                    <span class="send-icon">➤</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Socket.io Library -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- Frontend JavaScript -->
    <script src="script.js"></script>
</body>
</html>
