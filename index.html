<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ConnectNow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="card">

    <!-- Landing -->
    <div id="landing">
      <h1>ConnectNow</h1>
      <p class="tagline">Connect instantly. Chat freely.</p>

      <button onclick="showLogin()">Login</button>
      <button class="outline" onclick="showRegister()">Register</button>
    </div>

    <!-- Login -->
    <div id="login" class="hidden">
      <h2>Login</h2>
      <input type="text" placeholder="Username">
      <input type="password" placeholder="Password">
      <button>Login</button>
      <p class="back" onclick="goBack()">← Back</p>
    </div>

    <!-- Register Step 1 -->
    <div id="reg1" class="hidden">
      <h2>Register</h2>
      <input type="email" placeholder="Email">
      <button onclick="nextStep(1)">Next</button>
    </div>

    <!-- Register Step 2 -->
    <div id="reg2" class="hidden">
      <h2>Set Password</h2>
      <input type="password" placeholder="Password">
      <input type="password" placeholder="Confirm Password">
      <button onclick="nextStep(2)">Next</button>
    </div>

    <!-- Register Step 3 -->
    <div id="reg3" class="hidden">
      <h2>Profile Details</h2>
      <input type="text" placeholder="Username">
      <input type="date">
      <button>Create Account</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
